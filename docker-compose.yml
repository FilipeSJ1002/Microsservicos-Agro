version: '3.8'

services:
  postgres-agro:
    image: postgres:15
    container_name: postgres-agro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-agro
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  mongo-agro:
    image: mongo:latest
    container_name: mongo-agro
    ports:
      - "27017:27017"
    restart: unless-stopped

server.port=${SERVER_PORT:8084}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/bovexo_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:BovExoSecretKeyParaAvaliacaoTecnicaMuitoSegura2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

seeder.admin.username=${SEEDER_ADMIN_USERNAME}
seeder.admin.password=${SEEDER_ADMIN_PASSWORD}

seeder.guest.username=${SEEDER_GUEST_USERNAME}
seeder.guest.password=${SEEDER_GUEST_PASSWORD}

seeder.nutrition.username=${SEEDER_NUTRITION_USERNAME}
seeder.nutrition.password=${SEEDER_NUTRITION_PASSWORD}